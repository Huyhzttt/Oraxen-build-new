name: Build Oraxen

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew shadowJar --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: oraxen-jar
          path: build/libs/*.jar
